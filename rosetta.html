<style>
.search-bar { max-width:1400px; margin:0 auto 10px; padding:0 20px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.search-input {
  flex:1; min-width:200px; padding:10px 16px; border-radius:8px; border:1px solid #2d3748;
  background:#1a2332; color:#e0e0e0; font-size:0.9em; outline:none;
}
.search-input:focus { border-color:#63b3ed; }
.search-input::placeholder { color:#718096; }
.cat-filters { display:flex; gap:6px; flex-wrap:wrap; }
.cat-btn {
  padding:5px 12px; border-radius:16px; border:1px solid #2d3748;
  background:#1a2332; color:#a0aec0; font-size:0.78em; cursor:pointer; transition:all 0.15s;
}
.cat-btn:hover { border-color:#63b3ed; color:#e0e0e0; }
.cat-btn.active { background:#63b3ed22; border-color:#63b3ed; color:#63b3ed; font-weight:600; }
.term-count { color:#718096; font-size:0.82em; padding:0 20px; max-width:1400px; margin:0 auto 10px; }
.term-table-wrap { max-width:1400px; margin:0 auto; padding:0 20px 30px; overflow-x:auto; }
#term-table { width:100%; border-collapse:collapse; font-size:0.85em; }
#term-table th {
  background:#1e2d3d; color:#63b3ed; padding:10px 14px; text-align:left;
  border-bottom:2px solid #2d3748; position:sticky; top:0; cursor:pointer; white-space:nowrap;
}
#term-table th:hover { background:#2d3748; }
#term-table td { padding:8px 14px; border-bottom:1px solid #2d3748; color:#e0e0e0; }
#term-table tr:hover td { background:#1e2d3d; }
#term-table td.cat-cell { font-size:0.78em; }
.cat-tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.82em; }
mark { background:#63b3ed44; color:#e0e0e0; padding:0 2px; border-radius:2px; }
.abbr { color:#718096; font-size:0.82em; }
</style>

const CAT_COLORS = {
  'MRV': '#63b3ed', '\u30aa\u30d5\u30bb\u30c3\u30c8': '#d69e2e', '\u56fd\u969b\u5236\u5ea6': '#805ad5',
  '\u57fa\u672c\u5236\u5ea6': '#48bb78', '\u5e02\u5834\u53d6\u5f15': '#ed8936', '\u696d\u7a2e': '#e53e3e', '\u914d\u984d\u5206\u914d': '#38b2ac'
};

let activeCategory = null;
let searchQuery = '';

function getCategories() {
  return [...new Set(TERMS.map(t => t.category))].sort();
}

function renderCatFilters() {
  const cats = getCategories();
  document.getElementById('cat-filters').innerHTML =
    `<button class="cat-btn ${!activeCategory?'active':''}" onclick="setCategory(null)">${t('allCats')}</button>` +
    cats.map(c => `<button class="cat-btn ${activeCategory===c?'active':''}" onclick="setCategory('${c}')">${c}</button>`).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderCatFilters();
  renderTermTable();
}

function filterTerms() {
  searchQuery = document.getElementById('search').value.toLowerCase();
  renderTermTable();
}

function highlight(text, query) {
  if (!query || !text) return text || '\u2014';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function updateSearchPlaceholder() {
  document.getElementById('search').placeholder = t('searchPlaceholder');
}

function renderTermTable() {
  let filtered = TERMS;
  if (activeCategory) filtered = filtered.filter(t => t.category === activeCategory);
  if (searchQuery) {
    filtered = filtered.filter(t =>
      [t.term_en, t.term_ja, t.term_ko, t.term_zh, t.abbreviation].some(v => v && v.toLowerCase().includes(searchQuery))
    );
  }

  document.getElementById('term-count').textContent =
    `${t('showingTerms')} ${filtered.length} ${t('ofTerms')} ${TERMS.length} ${t('terms')}`;

  let html = `<thead><tr>
    <th onclick="sortTerms('term_en')">English \u25B2\u25BC</th>
    <th onclick="sortTerms('term_ja')">\u65E5\u672C\u8A9E \u25B2\u25BC</th>
    <th onclick="sortTerms('term_ko')">\uD55C\uAD6D\uC5B4 \u25B2\u25BC</th>
    <th onclick="sortTerms('term_zh')">\u4E2D\u6587 \u25B2\u25BC</th>
    <th onclick="sortTerms('category')">${t('category')} \u25B2\u25BC</th>
  </tr></thead><tbody>`;

  filtered.forEach(t => {
    const catColor = CAT_COLORS[t.category] || THEME.muted;
    const abbr = t.abbreviation ? ` <span class="abbr">(${t.abbreviation})</span>` : '';
    html += `<tr>
      <td>${highlight(t.term_en, searchQuery)}${abbr}</td>
      <td>${highlight(t.term_ja, searchQuery)}</td>
      <td>${highlight(t.term_ko, searchQuery)}</td>
      <td>${highlight(t.term_zh, searchQuery)}</td>
      <td class="cat-cell"><span class="cat-tag" style="background:${catColor}22;color:${catColor};border:1px solid ${catColor}44">${t.category}</span></td>
    </tr>`;
  });
  html += '</tbody>';
  document.getElementById('term-table').innerHTML = html;
}

let termSortCol = '', termSortAsc = true;
function sortTerms(col) {
  if (termSortCol === col) { termSortAsc = !termSortAsc; } else { termSortCol = col; termSortAsc = true; }
  TERMS.sort((a, b) => {
    const va = (a[col] || '').toLowerCase();
    const vb = (b[col] || '').toLowerCase();
    return termSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  renderTermTable();
}

updateSearchPlaceholder();
renderCatFilters();
renderTermTable();
window.addEventListener('langchange', () => { updateSearchPlaceholder(); renderCatFilters(); renderTermTable(); });
document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
</script>
