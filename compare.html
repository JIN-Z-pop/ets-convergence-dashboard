<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETS System Comparison</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="shared.js?v=9"></script>
</head>
<body>
<script>initPage('compare');</script>

<div class="page-header">
  <h1 data-i18n="pageCompareTitle"></h1>
  <p data-i18n="pageCompareSub"></p>
</div>

<div class="chart-wrap"><div class="chart-box" id="radar-chart"></div></div>

<div class="chart-wrap">
  <div class="chart-box" style="padding:20px;overflow-x:auto;">
    <h3 id="detail-title" style="color:#63b3ed;margin-bottom:12px;"></h3>
    <table id="compare-table"></table>
  </div>
</div>

<style>
#compare-table { width:100%; border-collapse:collapse; font-size:0.85em; }
#compare-table th { background:#1e2d3d; color:#63b3ed; padding:10px 14px; text-align:left; border-bottom:2px solid #2d3748; cursor:pointer; white-space:nowrap; }
#compare-table th:hover { background:#2d3748; }
#compare-table td { padding:8px 14px; border-bottom:1px solid #2d3748; color:#e0e0e0; }
#compare-table tr:hover td { background:#1e2d3d; }
.country-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.82em; font-weight:600; color:#fff; }
</style>

<script>
// === RADAR AXES (multilingual) ===
const RADAR_AXES = {
  en: ['Price Level', 'Coverage %', 'Auction %', 'Penalty Severity', 'System Age'],
  ja: ['\u4FA1\u683C\u6C34\u6E96', '\u30AB\u30D0\u30FC\u7387 %', '\u30AA\u30FC\u30AF\u30B7\u30E7\u30F3\u7387 %', '\u7F70\u5247\u306E\u53B3\u3057\u3055', '\u5236\u5EA6\u5E74\u9F62'],
  ko: ['\uAC00\uACA9 \uC218\uC900', '\uCEE4\uBC84\uC728 %', '\uACBD\uB9E4\uC728 %', '\uBC8C\uCE59 \uAC15\uB3C4', '\uC81C\uB3C4 \uC5F0\uB839'],
  zh: ['\u4EF7\u683C\u6C34\u5E73', '\u8986\u76D6\u7387 %', '\u62CD\u5356\u7387 %', '\u5904\u7F5A\u4E25\u5389\u5EA6', '\u5236\u5EA6\u5E74\u9F84']
};

let RADAR_VALUES = null;
let TABLE_VALUES = null;

// === TABLE METRIC LABELS (multilingual) ===
const METRIC_LABELS = {
  en: ['System Name','Start Year','Current Price','Coverage','Covered Entities','Cap Type','Auction Rate','Allocation Method','Offset Allowed','Penalty','Banking','Borrowing','MRV System','2030 Target'],
  ja: ['\u5236\u5EA6\u540D','\u958B\u59CB\u5E74','\u73FE\u5728\u4FA1\u683C','\u30AB\u30D0\u30FC\u7387','\u5BFE\u8C61\u4F01\u696D\u6570','\u30AD\u30E3\u30C3\u30D7\u7A2E\u985E','\u30AA\u30FC\u30AF\u30B7\u30E7\u30F3\u7387','\u5272\u5F53\u65B9\u5F0F','\u30AA\u30D5\u30BB\u30C3\u30C8','\u7F70\u5247','\u7E70\u8D8A','\u501F\u5165','MRV\u30B7\u30B9\u30C6\u30E0','2030\u5E74\u76EE\u6A19'],
  ko: ['\uC81C\uB3C4\uBA85','\uC2DC\uC791 \uC5F0\uB3C4','\uD604\uC7AC \uAC00\uACA9','\uCEE4\uBC84\uC728','\uB300\uC0C1 \uAE30\uC5C5 \uC218','\uC0C1\uD55C \uC720\uD615','\uACBD\uB9E4\uC728','\uD560\uB2F9 \uBC29\uC2DD','\uC624\uD504\uC14B','\uBC8C\uCE59','\uC774\uC6D4','\uCC28\uC785','MRV \uC2DC\uC2A4\uD15C','2030\uB144 \uBAA9\uD45C'],
  zh: ['\u5236\u5EA6\u540D','\u8D77\u59CB\u5E74','\u5F53\u524D\u4EF7\u683C','\u8986\u76D6\u7387','\u7EB3\u5165\u4F01\u4E1A\u6570','\u4E0A\u9650\u7C7B\u578B','\u62CD\u5356\u7387','\u5206\u914D\u65B9\u5F0F','\u62B5\u6D88','\u5904\u7F5A','\u7ED3\u8F6C','\u501F\u5165','MRV\u7CFB\u7EDF','2030\u5E74\u76EE\u6807']
};

function renderRadar() {
  if (!RADAR_VALUES) return;
  const lang = getLang();
  const axes = RADAR_AXES[lang] || RADAR_AXES.en;
  const countries = ['EU', 'Korea', 'China', 'Japan'];
  const traces = countries.map(c => ({
    type: 'scatterpolar',
    r: [...RADAR_VALUES[c], RADAR_VALUES[c][0]],
    theta: [...axes, axes[0]],
    fill: 'toself',
    fillcolor: THEME.countries[c] + '18',
    name: c,
    line: { color: THEME.countries[c], width: 2 },
    marker: { size: 5 }
  }));

  const layout = darkLayout(t('chartRadar'), {
    polar: {
      bgcolor: THEME.card,
      radialaxis: { visible: true, range: [0, 105], gridcolor: THEME.border, tickfont: { color: THEME.dimmed, size: 10 } },
      angularaxis: { gridcolor: THEME.border, tickfont: { color: THEME.muted, size: 11 } }
    },
    legend: { orientation: 'h', y: -0.08, font: { color: THEME.muted } },
    margin: { l: 60, r: 60, t: 50, b: 60 }
  });

  Plotly.newPlot('radar-chart', traces, layout, plotlyConfig);
}

function renderTable() {
  if (!TABLE_VALUES) return;
  const lang = getLang();
  const metrics = METRIC_LABELS[lang] || METRIC_LABELS.en;
  const countries = ['EU', 'Korea', 'China', 'Japan'];
  const colors = countries.map(c => THEME.countries[c]);

  document.getElementById('detail-title').textContent = t('detailCompare');

  let html = '<thead><tr><th onclick="sortTable(0)">' + t('metric') + ' \u25B2\u25BC</th>';
  countries.forEach((c, i) => {
    html += `<th onclick="sortTable(${i+1})"><span class="country-badge" style="background:${colors[i]}">${COUNTRY_FLAGS[c]} ${c}</span> \u25B2\u25BC</th>`;
  });
  html += '</tr></thead><tbody>';

  metrics.forEach((label, idx) => {
    const row = TABLE_VALUES[idx];
    html += `<tr><td style="font-weight:600;color:${THEME.accent}">${label}</td>`;
    countries.forEach(c => { html += `<td>${row[c]}</td>`; });
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('compare-table').innerHTML = html;
}

let sortCol = -1, sortAsc = true;
function sortTable(col) {
  const table = document.getElementById('compare-table');
  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  rows.sort((a, b) => {
    const va = a.children[col].textContent;
    const vb = b.children[col].textContent;
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  rows.forEach(r => tbody.appendChild(r));
}

// Load data then render
fetch('data/systems.json')
  .then(r => r.json())
  .then(data => {
    RADAR_VALUES = data.radar;
    TABLE_VALUES = data.table;
    renderRadar();
    renderTable();
  })
  .catch(err => console.error('Failed to load systems data:', err));

window.addEventListener('langchange', () => { renderRadar(); renderTable(); });
document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
</script>
</body>
</html>
