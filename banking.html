<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETS Banking Rules</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="shared.js?v=9"></script>
</head>
<body>
<script>initPage('banking');</script>

<div class="page-header">
  <h1 data-i18n="pageBankingTitle"></h1>
  <p data-i18n="pageBankingSub"></p>
</div>

<!-- Country Cards -->
<div class="cards" id="banking-cards"></div>

<!-- Chart 1: K-ETS Phase Evolution -->
<div class="chart-wrap"><div class="chart-box" id="phase-evo-chart"></div></div>

<!-- Chart 2: K-ETS Trading Volume & Price -->
<div class="chart-wrap"><div class="chart-box" id="trading-chart"></div></div>

<!-- Simulator -->
<h3 class="section-title" id="sim-title" data-i18n="simTitle"></h3>
<div class="chart-wrap">
  <div class="chart-box" id="simulator-box" style="padding:24px 28px;">
    <p style="color:var(--muted);font-size:0.88em;margin-bottom:18px;" data-i18n="simSub"></p>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;">
      <label style="color:var(--muted);font-size:0.88em;white-space:nowrap;" data-i18n="simNetSales"></label>
      <input type="range" id="ns-slider" min="0" max="100000" step="1000" value="20000"
        style="flex:1;min-width:200px;accent-color:var(--korea);">
      <span id="ns-value" style="font-family:'DM Sans',monospace;color:var(--gold);font-size:1.1em;font-weight:600;min-width:100px;text-align:right;">20,000</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;" id="sim-results"></div>
  </div>
</div>

<!-- Chart 3: 4-Country Comparison -->
<div class="chart-wrap"><div class="chart-box" id="country-compare-chart"></div></div>

<!-- Comparison Table -->
<div class="chart-wrap">
  <div class="chart-box" style="padding:20px;overflow-x:auto;">
    <table id="banking-table" style="width:100%;"></table>
  </div>
</div>

<!-- Insights -->
<div class="analysis-box" id="insights-box"></div>

<style>
#banking-table th { background:#1e2d3d; color:var(--accent); padding:10px 14px; text-align:left; border-bottom:2px solid var(--border); white-space:nowrap; }
#banking-table td { padding:8px 14px; border-bottom:1px solid var(--border); color:var(--text); font-size:0.88em; }
#banking-table tr:hover td { background:var(--hover); }
.sim-card {
  background: var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:18px 20px; text-align:center; transition: border-color 0.3s;
}
.sim-card:hover { border-color: var(--korea); }
.sim-label { font-size:0.78em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
.sim-value { font-family:var(--font-display); font-size:1.6em; color:var(--korea); }
.sim-note { font-size:0.72em; color:var(--dimmed); margin-top:4px; min-height:1.2em; }
.country-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.82em; font-weight:600; color:#fff; }
</style>

<script>
// === DATA ===
let DATA = null;

// Helper: extract localized string from multilingual object or plain string
function L(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[getLang()] || obj.en || '';
}

// === BANKING CARDS ===
function renderCards() {
  if (!DATA) return;
  const c = DATA.countries;
  const items = [
    { key: 'EU', flag: COUNTRY_FLAGS.EU, rule: L(c.EU.banking), detail: L(c.EU.banking_detail), color: THEME.countries.EU },
    { key: 'Korea', flag: COUNTRY_FLAGS.Korea, rule: L(c.Korea.banking), detail: L(c.Korea.banking_detail), color: THEME.countries.Korea },
    { key: 'China', flag: COUNTRY_FLAGS.China, rule: L(c.China.banking), detail: L(c.China.banking_detail), color: THEME.countries.China },
    { key: 'Japan', flag: COUNTRY_FLAGS.Japan, rule: L(c.Japan.banking), detail: L(c.Japan.banking_detail), color: THEME.countries.Japan }
  ];
  document.getElementById('banking-cards').innerHTML = items.map(k => `
    <div class="card" style="border-top:3px solid ${k.color};">
      <div class="country-flag">${k.flag}</div>
      <div class="country-name" style="color:${k.color}">${k.key}</div>
      <div class="value" style="color:${k.color};font-size:1.3em;">${k.rule}</div>
      <div class="sub" style="margin-top:8px;line-height:1.5;">${k.detail}</div>
    </div>
  `).join('');
}

// === CHART 1: Phase Evolution (grouped bar) ===
function renderPhaseEvo() {
  if (!DATA) return;
  const phases = DATA.phases;
  const labels = phases.map(p => p.phase + '<br>' + p.period);

  const traces = [
    {
      name: t('freeAlloc'),
      x: labels, y: phases.map(p => p.free_pct),
      type: 'bar',
      marker: { color: THEME.countries.Korea + 'cc' },
      yaxis: 'y'
    },
    {
      name: t('auctionPct'),
      x: labels, y: phases.map(p => p.auction_pct),
      type: 'bar',
      marker: { color: THEME.gold + 'cc' },
      yaxis: 'y'
    },
    {
      name: t('volume') + ' (Mt)',
      x: labels, y: phases.map(p => p.total_volume_mt),
      type: 'scatter', mode: 'lines+markers',
      line: { color: THEME.accent, width: 3 },
      marker: { size: 10, color: THEME.accent },
      yaxis: 'y2'
    }
  ];

  const layout = darkLayout(t('chartPhaseEvo'), {
    barmode: 'stack',
    yaxis: { title: '%', range: [0, 110], gridcolor: THEME.border, tickfont: { color: THEME.muted } },
    yaxis2: {
      title: 'Mt', overlaying: 'y', side: 'right', range: [0, 160],
      gridcolor: 'transparent', tickfont: { color: THEME.accent, size: 11 },
      titlefont: { color: THEME.accent }
    },
    legend: { orientation: 'h', y: -0.18, font: { color: THEME.muted } },
    margin: { l: 50, r: 60, t: 50, b: 80 },
    annotations: [
      { x: labels[1], y: 105, text: {en:'Banking<br>restriction<br>introduced',ja:'繰越制限<br>導入',ko:'이월제한<br>도입',zh:'结转限制<br>引入'}[getLang()]||'Banking<br>restriction<br>introduced', showarrow: true, arrowhead: 2, arrowcolor: THEME.countries.China, font: { color: THEME.countries.China, size: 11 }, ay: -40 }
    ]
  });

  Plotly.newPlot('phase-evo-chart', traces, layout, plotlyConfig);
}

// === CHART 2: Trading Volume & Price ===
function renderTrading() {
  if (!DATA) return;
  const td = DATA.trading;
  const phaseColors = td.map(d => d.phase === 1 ? THEME.countries.Japan : d.phase === 2 ? THEME.countries.Korea : THEME.accent);

  const traces = [
    {
      name: t('volume'),
      x: td.map(d => d.year), y: td.map(d => d.volume_mt),
      type: 'bar',
      marker: { color: phaseColors, opacity: 0.8 },
      yaxis: 'y'
    },
    {
      name: t('priceKRW'),
      x: td.map(d => d.year), y: td.map(d => d.avg_price_krw),
      type: 'scatter', mode: 'lines+markers',
      line: { color: THEME.gold, width: 3 },
      marker: { size: 8, color: THEME.gold },
      yaxis: 'y2'
    }
  ];

  const layout = darkLayout(t('chartTrading'), {
    yaxis: { title: 'Mt', gridcolor: THEME.border, tickfont: { color: THEME.muted } },
    yaxis2: {
      title: '\u20A9/t', overlaying: 'y', side: 'right',
      gridcolor: 'transparent', tickfont: { color: THEME.gold, size: 11 },
      titlefont: { color: THEME.gold }
    },
    legend: { orientation: 'h', y: -0.15, font: { color: THEME.muted } },
    margin: { l: 50, r: 70, t: 50, b: 60 },
    shapes: [
      { type: 'rect', x0: 2017.5, x1: 2020.5, y0: 0, y1: 1, yref: 'paper', fillcolor: THEME.countries.Korea, opacity: 0.06, line: { width: 0 } },
      { type: 'line', x0: 2017.5, x1: 2017.5, y0: 0, y1: 1, yref: 'paper', line: { color: THEME.countries.Korea, width: 1.5, dash: 'dash' } }
    ],
    annotations: [
      { x: 2019, y: 1.05, yref: 'paper', text: {en:'Phase 2: Banking Restriction',ja:'Phase 2: 繰越制限',ko:'2차: 이월 제한',zh:'第二阶段: 结转限制'}[getLang()]||'Phase 2: Banking Restriction', showarrow: false, font: { color: THEME.countries.Korea, size: 11 } }
    ]
  });

  Plotly.newPlot('trading-chart', traces, layout, plotlyConfig);
}

// === SIMULATOR ===
function updateSimulator() {
  if (!DATA) return;
  const ns = parseInt(document.getElementById('ns-slider').value);
  document.getElementById('ns-value').textContent = ns.toLocaleString();

  const sim = DATA.simulator;
  // Korea Year 1
  const kr1_calc = ns * sim.korea.year1_multiplier;
  const kr1 = Math.max(kr1_calc, sim.korea.year1_min);
  const kr1_min = kr1_calc < sim.korea.year1_min;
  // Korea Year 2
  const kr2_calc = ns * sim.korea.year2_multiplier;
  const kr2 = Math.max(kr2_calc, sim.korea.year2_min);
  const kr2_min = kr2_calc < sim.korea.year2_min;
  // China
  const cn = sim.china.base + ns * sim.china.multiplier;

  document.getElementById('sim-results').innerHTML = `
    <div class="sim-card" style="border-color:${THEME.countries.Korea}33;">
      <div class="sim-label" style="color:${THEME.countries.Korea};">\u{1F1F0}\u{1F1F7} Korea ${t('simYear1')}</div>
      <div class="sim-value">${kr1.toLocaleString()}</div>
      <div class="sim-note">${kr1_min ? '\u26A0 ' + t('simMinGuarantee') : 'NS \u00D7 5 = ' + kr1_calc.toLocaleString()}</div>
    </div>
    <div class="sim-card" style="border-color:${THEME.countries.Korea}33;">
      <div class="sim-label" style="color:${THEME.countries.Korea};">\u{1F1F0}\u{1F1F7} Korea ${t('simYear2')}</div>
      <div class="sim-value">${kr2.toLocaleString()}</div>
      <div class="sim-note">${kr2_min ? '\u26A0 ' + t('simMinGuarantee') : 'NS \u00D7 5 = ' + kr2_calc.toLocaleString()}</div>
    </div>
    <div class="sim-card" style="border-color:${THEME.countries.China}33;">
      <div class="sim-label" style="color:${THEME.countries.China};">\u{1F1E8}\u{1F1F3} China</div>
      <div class="sim-value">${cn.toLocaleString()}</div>
      <div class="sim-note">100K + NS \u00D7 1.5 = ${cn.toLocaleString()}</div>
    </div>
    <div class="sim-card" style="border-color:${THEME.countries.EU}33;">
      <div class="sim-label" style="color:${THEME.countries.EU};">\u{1F1EA}\u{1F1FA} EU</div>
      <div class="sim-value">\u221E</div>
      <div class="sim-note">${{en:'Unlimited banking',ja:'無制限繰越',ko:'무제한 이월',zh:'无限制结转'}[getLang()]||'Unlimited banking'}</div>
    </div>
  `;
}

// === CHART 3: Country Comparison (horizontal bar) ===
function renderCountryCompare() {
  if (!DATA) return;
  const c = DATA.countries;
  const countries = ['EU', 'Korea', 'China', 'Japan'];
  const colors = countries.map(k => THEME.countries[k]);

  const traces = [
    {
      name: t('banking') + ' ' + t('restriction'),
      y: countries, x: countries.map(k => c[k].strictness),
      type: 'bar', orientation: 'h',
      marker: { color: colors.map(c => c + 'cc') },
      text: countries.map(k => L(c[k].banking)),
      textposition: 'inside',
      textfont: { color: '#fff', size: 12 },
      hovertemplate: '<b>%{y}</b><br>%{text}<br>Strictness: %{x}/100<extra></extra>'
    }
  ];

  const layout = darkLayout(t('chartCountryCompare'), {
    xaxis: { title: {en:'Strictness →',ja:'厳格度 →',ko:'엄격도 →',zh:'严格度 →'}[getLang()]||'Strictness →', range: [0, 100], gridcolor: THEME.border, tickfont: { color: THEME.muted } },
    yaxis: { tickfont: { color: THEME.muted, size: 13 }, automargin: true },
    showlegend: false,
    height: 320,
    margin: { l: 80, r: 30, t: 50, b: 50 },
    annotations: [
      { x: 85, y: 'EU', text: {en:'MSR controls supply',ja:'MSRが供給制御',ko:'MSR 공급 제어',zh:'MSR控制供应'}[getLang()]||'MSR controls supply', showarrow: false, font: { color: THEME.dimmed, size: 10 } }
    ]
  });

  Plotly.newPlot('country-compare-chart', traces, layout, plotlyConfig);
}

// === COMPARISON TABLE ===
function renderTable() {
  if (!DATA) return;
  const c = DATA.countries;
  const countries = ['EU', 'Korea', 'China', 'Japan'];
  const colors = countries.map(k => THEME.countries[k]);
  const metrics = [
    { key: 'banking', label: t('banking') },
    { key: 'banking_detail', label: t('restriction') },
    { key: 'borrowing', label: t('borrowing') },
    { key: 'offset', label: t('offset') },
    { key: 'stabilization', label: t('stabilization') }
  ];

  let html = '<thead><tr><th>' + t('metric') + '</th>';
  countries.forEach((k, i) => {
    html += `<th><span class="country-badge" style="background:${colors[i]}">${COUNTRY_FLAGS[k]} ${k}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  metrics.forEach(m => {
    html += `<tr><td style="font-weight:600;color:${THEME.accent}">${m.label}</td>`;
    countries.forEach(k => { html += `<td>${L(c[k][m.key])}</td>`; });
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('banking-table').innerHTML = html;
}

    '<strong>EU\'s Approach</strong>: Unlimited banking works when combined with MSR (Market Stability Reserve) which automatically absorbs excess supply. The key is indirect control rather than direct limits.',

  ],

function renderInsights() {
  const tx = INSIGHTS[getLang()] || INSIGHTS.en;
  document.getElementById('insights-box').innerHTML =
    `<h3>${t('bankingInsights')}</h3>` + tx.map(p => `<p>${p}</p>`).join('');
}

// === RENDER ALL ===
function renderAll() {
  renderCards();
  renderPhaseEvo();
  renderTrading();
  updateSimulator();
  renderCountryCompare();
  renderTable();
  renderInsights();
}

// === LOAD & INIT ===
fetch('data/banking.json')
  .then(r => r.json())
  .then(data => {
    DATA = data;
    renderAll();
  })
  .catch(err => console.error('Failed to load banking data:', err));

document.getElementById('ns-slider').addEventListener('input', updateSimulator);
window.addEventListener('langchange', renderAll);
document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
