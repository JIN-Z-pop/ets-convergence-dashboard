const CURRENT = [
  { country: 'EU', age: 21, price: 79, coverage: 1600, label: 'EU 2026' },

  { country: 'China', age: 5, price: 11, coverage: 5000, label: 'China 2026' },
  { country: 'Japan', age: 3, price: 0, coverage: 400, label: 'Japan 2026' }
];

const PREDICTED_2030 = [
  { country: 'EU', age: 25, price: 85, coverage: 2000, label: 'EU 2030' },
  { country: 'Korea', age: 15, price: 25, coverage: 700, label: 'Korea 2030' },
  { country: 'China', age: 9, price: 20, coverage: 6000, label: 'China 2030' },
  { country: 'Japan', age: 7, price: 15, coverage: 500, label: 'Japan 2030' }
];

function renderScatter() {
  const makeTrace = (data, dash) => data.map(d => ({
    x: [d.age], y: [d.price],
    mode: 'markers+text',
    name: d.label,
    text: [d.label],
    textposition: d.country === 'Japan' ? 'top center' : 'top right',
    textfont: { color: THEME.countries[d.country], size: 10 },
    marker: {
      size: Math.sqrt(d.coverage) * 0.8,
      color: THEME.countries[d.country] + (dash ? '66' : 'cc'),
      line: { color: THEME.countries[d.country], width: dash ? 2 : 0, dash: dash ? 'dash' : '' }
    },
    showlegend: false
  }));

  const currentTraces = makeTrace(CURRENT, false);
  const predictTraces = makeTrace(PREDICTED_2030, true);

  const arrows = CURRENT.map((c, i) => {
    const p = PREDICTED_2030[i];
    return {
      x: p.age, y: p.price, ax: c.age, ay: c.price,
      xref: 'x', yref: 'y', axref: 'x', ayref: 'y',
      showarrow: true, arrowhead: 2, arrowsize: 1, arrowwidth: 1.5,
      arrowcolor: THEME.countries[c.country] + '88'
    };
  });

  const layout = darkLayout(t('chartScatter'), {
    xaxis: { title: 'System Age (years)', gridcolor: THEME.border, tickfont: { color: THEME.muted }, range: [0, 28] },
    yaxis: { title: 'Carbon Price (USD/tCO\u2082)', gridcolor: THEME.border, tickfont: { color: THEME.muted }, range: [-5, 100] },
    margin: { l: 60, r: 30, t: 50, b: 60 },
    annotations: [
      ...arrows,
      { x: 14, y: 95, text: t('bubbleNote'), showarrow: false, font: { color: THEME.dimmed, size: 10 } },
      { x: 14, y: 88, text: t('solidFaded'), showarrow: false, font: { color: THEME.dimmed, size: 10 } }
    ],
    shapes: [
      { type: 'rect', x0: 5, x1: 28, y0: 20, y1: 90, fillcolor: '#48bb7808', line: { width: 0 } }
    ]
  });

  Plotly.newPlot('scatter-chart', [...currentTraces, ...predictTraces], layout, plotlyConfig);
}

    `<div class="axis-item axis-conv"><div class="axis-title">${a.title}</div>${a.desc}</div>`

  ).join('');
