<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETS Convergence Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="shared.js?v=8"></script>
</head>
<body>
<script>initPage('index');</script>

<div class="page-header">
  <h1 data-i18n="dashTitle"></h1>
  <p data-i18n="dashSub"></p>
</div>

<div class="cards" id="kpi-cards"></div>
<div class="chart-wrap">
  <div id="phase-selector" style="display:flex;gap:8px;margin-bottom:4px;padding:0 8px;flex-wrap:wrap;align-items:center;">
    <span style="font-size:0.85em;color:var(--muted);margin-right:4px;" data-i18n="phaseView"></span>
    <button class="phase-btn phase-btn-active" data-phase="all">All</button>
    <button class="phase-btn" data-phase="EU" style="--btn-c:var(--eu)">EU</button>
    <button class="phase-btn" data-phase="Korea" style="--btn-c:var(--korea)">Korea</button>
    <button class="phase-btn" data-phase="China" style="--btn-c:var(--china)">China</button>
    <button class="phase-btn" data-phase="Japan" style="--btn-c:var(--japan)">Japan</button>
  </div>
  <div class="chart-box" id="price-chart"></div>
</div>

<div class="analysis-box" id="about-box"></div>

<script>
// === ABOUT TEXTS ===
const ABOUT = {
  en: [
    'This dashboard visualizes the convergence and divergence of Emission Trading Systems (ETS) across four major economies \u2014 EU, Korea, China, and Japan \u2014 as they approach 2030.',
    'Navigate using the top bar to explore system comparisons, allocation evolution, CBAM impacts, convergence mapping, and a 4-language ETS terminology reference.'
  ],
  ja: [
    '\u3053\u306E\u30C0\u30C3\u30B7\u30E5\u30DC\u30FC\u30C9\u306F\u3001EU\u30FB\u97D3\u56FD\u30FB\u4E2D\u56FD\u30FB\u65E5\u672C\u306E4\u3064\u306E\u4E3B\u8981\u7D4C\u6E08\u570F\u306B\u304A\u3051\u308B\u6392\u51FA\u6A29\u53D6\u5F15\u5236\u5EA6\uFF08ETS\uFF09\u306E2030\u5E74\u306B\u5411\u3051\u305F\u7D71\u5408\u5206\u6790\u3092\u53EF\u8996\u5316\u3057\u307E\u3059\u3002',
    '\u4E0A\u90E8\u306E\u30CA\u30D3\u30B2\u30FC\u30B7\u30E7\u30F3\u304B\u3089\u3001\u5236\u5EA6\u6BD4\u8F03\u3001\u5272\u5F53\u65B9\u5F0F\u306E\u9032\u5316\u3001CBAM\u306E\u5F71\u97FF\u3001\u7D71\u5408\u5206\u6790\u30DE\u30C3\u30D7\u30014\u8A00\u8A9EETS\u7528\u8A9E\u96C6\u3092\u3054\u89A7\u304F\u3060\u3055\u3044\u3002'
  ],
  ko: [
    '\uC774 \uB300\uC2DC\uBCF4\uB4DC\uB294 EU\u00B7\uD55C\uAD6D\u00B7\uC911\uAD6D\u00B7\uC77C\uBCF8 4\uAC1C \uC8FC\uC694 \uACBD\uC81C\uAD8C\uC758 \uBC30\uCD9C\uAD8C\uAC70\uB798\uC81C(ETS)\uAC00 2030\uB144\uC744 \uD5A5\uD574 \uC5B4\uB5BB\uAC8C \uC218\uB834\u00B7\uBD84\uAE30\uD558\uACE0 \uC788\uB294\uC9C0 \uC2DC\uAC01\uD654\uD569\uB2C8\uB2E4.',
    '\uC0C1\uB2E8 \uB0B4\uBE44\uAC8C\uC774\uC158\uC744 \uD1B5\uD574 \uC81C\uB3C4 \uBE44\uAD50, \uD560\uB2F9 \uBC29\uC2DD\uC758 \uC9C4\uD654, CBAM \uC601\uD5A5, \uC218\uB834\u00B7\uBD84\uAE30 \uB9E4\uD551, 4\uAC1C \uC5B8\uC5B4 ETS \uC6A9\uC5B4\uC9D1\uC744 \uC0B4\uD3B4\uBCF4\uC138\uC694.'
  ],
  zh: [
    '\u6B64\u4EEA\u8868\u677F\u53EF\u89C6\u5316\u4E86EU\u00B7\u97E9\u56FD\u00B7\u4E2D\u56FD\u00B7\u65E5\u672C\u56DB\u5927\u7ECF\u6D4E\u4F53\u6392\u653E\u6743\u4EA4\u6613\u5236\u5EA6(ETS)\u57282030\u5E74\u524D\u7684\u8D8B\u540C\u4E0E\u5206\u6B67\u3002',
    '\u901A\u8FC7\u9876\u90E8\u5BFC\u822A\u680F\u63A2\u7D22\u5236\u5EA6\u6BD4\u8F83\u3001\u5206\u914D\u65B9\u5F0F\u6F14\u53D8\u3001CBAM\u5F71\u54CD\u3001\u8D8B\u540C\u00B7\u5206\u6B67\u5730\u56FE\u548C\u56DB\u8BEDETS\u672F\u8BED\u53C2\u8003\u3002'
  ]
};

function renderAbout() {
  const tx = ABOUT[getLang()] || ABOUT.en;
  document.getElementById('about-box').innerHTML =
    `<h3>${t('aboutTitle')}</h3>` + tx.map(p => `<p>${p}</p>`).join('');
}

// === DATA (loaded via fetch) ===
let PRICES = null;

// === KPI CARDS ===
const KPI = [
  { country: 'EU', flag: '\u{1F1EA}\u{1F1FA}', price: '\u20AC72/t', priceUsd: '~$79/t', coverage: '40%', entities: '~11,000', since: '2005', color: THEME.countries.EU },
  { country: 'Korea', flag: '\u{1F1F0}\u{1F1F7}', price: '\u20A911,443/t', priceUsd: '~$8/t', coverage: '68%', entities: '~680', since: '2015', color: THEME.countries.Korea },
  { country: 'China', flag: '\u{1F1E8}\u{1F1F3}', price: '\u00A578.6/t', priceUsd: '~$11/t', coverage: '60%', entities: '~3,500', since: '2021', color: THEME.countries.China },
  { country: 'Japan', flag: '\u{1F1EF}\u{1F1F5}', price: 'GX-ETS', priceUsd: 'N/A', coverage: '60%*', entities: '~747', since: '2023', color: THEME.countries.Japan },
];

function renderCards() {
  const lang = getLang();
  const labels = { price: t('price'), coverage: t('coverage'), entities: t('entities'), since: t('since') };
  document.getElementById('kpi-cards').innerHTML = KPI.map(k => `
    <div class="card" style="border-top: 3px solid ${k.color};">
      <div class="country-flag">${k.flag}</div>
      <div class="country-name" style="color:${k.color}">${k.country}</div>
      <div class="value" style="color:${k.color}">${k.price}</div>
      <div class="sub">${k.priceUsd}</div>
      <div style="display:flex;justify-content:space-around;margin-top:14px;font-size:0.82em;color:${THEME.muted};gap:8px">
        <div><div style="font-weight:600;color:${THEME.text};font-size:1.1em">${k.coverage}</div>${labels.coverage}</div>
        <div><div style="font-weight:600;color:${THEME.text};font-size:1.1em">${k.entities}</div>${labels.entities}</div>
        <div><div style="font-weight:600;color:${THEME.text};font-size:1.1em">${k.since}</div>${labels.since}</div>
      </div>
    </div>
  `).join('');
}

// === PHASE DATA ===
const PHASE_DATA = {
  EU: [
    { x0: 2005, x1: 2008, label: 'Phase 1', sub: '2005\u20132007' },
    { x0: 2008, x1: 2013, label: 'Phase 2', sub: '2008\u20132012' },
    { x0: 2013, x1: 2021, label: 'Phase 3', sub: '2013\u20132020' },
    { x0: 2021, x1: 2030, label: 'Phase 4', sub: '2021\u2013' },
  ],
  Korea: [
    { x0: 2015, x1: 2018, label: 'Phase 1', sub: '2015\u20132017' },
    { x0: 2018, x1: 2021, label: 'Phase 2', sub: '2018\u20132020' },
    { x0: 2021, x1: 2026, label: 'Phase 3', sub: '2021\u20132025' },
    { x0: 2026, x1: 2030, label: 'Phase 4', sub: '2026\u2013' },
  ],
  China: [
    { x0: 2021, x1: 2025, label: 'Power Only', sub: '2021\u20132024' },
    { x0: 2025, x1: 2030, label: '4-Sector', sub: '2025\u2013' },
  ],
  Japan: [
    { x0: 2023, x1: 2026, label: 'GX League', sub: '2023\u20132025' },
    { x0: 2026, x1: 2030, label: 'GX-ETS', sub: '2026\u2013' },
  ],
};

let activePhase = 'all';

// === PRICE CHART ===
function renderPriceChart() {
  if (!PRICES) return;
  const fx = PRICES.fx;
  const traces = [
    {
      x: PRICES.eu_eur.map(r => r.year),
      y: PRICES.eu_eur.map(r => +(r.avg_price * fx.EUR_USD).toFixed(1)),
      name: 'EU-ETS (EUR\u2192USD)', mode: 'lines+markers',
      line: { color: THEME.countries.EU, width: 3 },
      marker: { size: 6 }
    },
    {
      x: PRICES.korea_krw.map(r => r.year),
      y: PRICES.korea_krw.map(r => +(r.avg_price * fx.KRW_USD).toFixed(1)),
      name: 'K-ETS (KRW\u2192USD)', mode: 'lines+markers',
      line: { color: THEME.countries.Korea, width: 3 },
      marker: { size: 6 }
    },
    {
      x: PRICES.china_cny.map(r => r.year),
      y: PRICES.china_cny.map(r => +(r.avg_price * fx.CNY_USD).toFixed(1)),
      name: 'China-ETS (CNY\u2192USD)', mode: 'lines+markers',
      line: { color: THEME.countries.China, width: 3 },
      marker: { size: 6 }
    },
    {
      x: [2023, 2024, 2025, 2026, 2027, 2028, 2029, 2030],
      y: [0, 0, 0, 0, 0, 0, 0, 0],
      name: 'Japan GX-ETS (2026\u2013) \u2014 ' + t('jpNoPrice'), mode: 'lines+markers',
      line: { color: THEME.countries.Japan, width: 3, dash: 'dot' },
      marker: { size: 6 },
      showlegend: true
    }
  ];

  let shapes = [];
  let annotations = [];
  let marginTop = 50;

  if (activePhase === 'all') {
    // === ALL MODE: Mini-Gantt bands at top ===
    marginTop = 130;
    const bandH = 0.06;
    const bandGap = 0.03;
    const allBands = [
      { country: 'EU', row: 0 },
      { country: 'Korea', row: 1 },
      { country: 'China', row: 2 },
      { country: 'Japan', row: 3 },
    ];
    allBands.forEach(({ country, row }) => {
      const color = THEME.countries[country];
      PHASE_DATA[country].forEach(p => {
        const yBase = 1.01 + (3 - row) * (bandH + bandGap);
        shapes.push({
          type: 'rect', xref: 'x', yref: 'paper',
          x0: String(p.x0), x1: String(p.x1),
          y0: yBase, y1: yBase + bandH,
          fillcolor: color + '44', line: { color: color, width: 1.5 }
        });
        const midX = (p.x0 + p.x1) / 2;
        // Short labels for mini-gantt: numbers for Phase N, abbreviations for named phases
        const shortLabels = { 'Phase 1':'1', 'Phase 2':'2', 'Phase 3':'3', 'Phase 4':'4',
          'Power Only':'Pwr', '4-Sector':'4S', 'GX League':'GXL', 'GX-ETS':'GX' };
        const bandLabel = shortLabels[p.label] || p.label;
        annotations.push({
          x: String(midX), xref: 'x', yref: 'paper',
          y: yBase + bandH / 2,
          text: `<b>${bandLabel}</b>`, showarrow: false,
          font: { color: '#e0e0e0', size: 11 }, xanchor: 'center', yanchor: 'middle'
        });
      });
      // Country label
      annotations.push({
        x: '2003.5', xref: 'x', yref: 'paper',
        y: 1.01 + (3 - row) * (bandH + bandGap) + bandH / 2,
        text: `<b>${{EU:'EU',Korea:'KR',China:'CN',Japan:'JP'}[country]}</b>`,
        showarrow: false,
        font: { color: color, size: 11 }, xanchor: 'right', yanchor: 'middle'
      });
    });
  } else {
    // === COUNTRY MODE: Full-height background panels ===
    const country = activePhase;
    const color = THEME.countries[country];
    const phases = PHASE_DATA[country];
    // Distinct fill per phase — progressively stronger tint
    const phaseColors = {
      EU:    ['rgba(74,144,217,0.06)','rgba(74,144,217,0.12)','rgba(74,144,217,0.18)','rgba(74,144,217,0.25)'],
      Korea: ['rgba(86,184,112,0.06)','rgba(86,184,112,0.12)','rgba(86,184,112,0.18)','rgba(86,184,112,0.25)'],
      China: ['rgba(232,148,58,0.10)','rgba(232,148,58,0.20)'],
      Japan: ['rgba(214,69,69,0.10)','rgba(214,69,69,0.20)'],
    };
    const fills = phaseColors[country] || phases.map((_,i) => color + (i % 2 ? '10' : '18'));

    phases.forEach((p, i) => {
      shapes.push({
        type: 'rect', xref: 'x', yref: 'paper',
        x0: String(p.x0), x1: String(p.x1),
        y0: 0, y1: 1,
        fillcolor: fills[i],
        line: { color: color + '40', width: 1 },
        layer: 'below'
      });
      const midX = (p.x0 + p.x1) / 2;
      // Phase label + year range combined above chart
      annotations.push({
        x: String(midX), xref: 'x', yref: 'paper', y: 1.02,
        text: `<b>${p.label}</b><br><span style="font-size:9px">${p.sub}</span>`,
        showarrow: false,
        font: { color: color, size: 13 }, xanchor: 'center', yanchor: 'bottom'
      });
    });
    marginTop = 80;
  }

  const layout = darkLayout(t('chartPrice'), {
    yaxis: { title: 'USD / tCO\u2082', gridcolor: THEME.border, zerolinecolor: THEME.border, tickfont: { color: THEME.muted } },
    xaxis: { title: t('year'), gridcolor: THEME.border, tickfont: { color: THEME.muted }, range: [2003, 2031] },
    legend: { orientation: 'h', y: -0.32, x: 0.5, xanchor: 'center', font: { color: THEME.muted, size: 12 }, tracegroupgap: 30 },
    shapes: shapes,
    margin: { t: marginTop, b: 80, l: 60 },
    annotations: annotations
  });

  Plotly.newPlot('price-chart', traces, layout, plotlyConfig);
}

// === PHASE SELECTOR LOGIC ===
document.querySelectorAll('.phase-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('phase-btn-active'));
    btn.classList.add('phase-btn-active');
    activePhase = btn.dataset.phase;
    renderPriceChart();
  });
});

// === INIT ===
renderCards();
renderAbout();

// Load price data from JSON, then render chart
fetch('data/prices.json')
  .then(r => r.json())
  .then(data => { PRICES = data; renderPriceChart(); })
  .catch(err => {
    console.error('Failed to load prices:', err);
    document.getElementById('price-chart').innerHTML =
      '<p style="color:#e53e3e;text-align:center;padding:40px;">Failed to load price data.</p>';
  });

// Update on language change
window.addEventListener('langchange', () => { renderCards(); renderPriceChart(); renderAbout(); });

// Fix i18n on load
document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
</script>
</body>
</html>
