<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETS Convergence Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="shared.js?v=3"></script>
</head>
<body>
<script>initPage('index');</script>

<div class="page-header">
  <h1 data-i18n="dashTitle"></h1>
  <p data-i18n="dashSub"></p>
</div>

<div class="cards" id="kpi-cards"></div>
<div class="chart-wrap"><div class="chart-box" id="price-chart"></div></div>

<div class="analysis-box" id="about-box"></div>

<script>
// === ABOUT TEXTS ===
const ABOUT = {
  en: [
    'This dashboard visualizes the convergence and divergence of Emission Trading Systems (ETS) across four major economies \u2014 EU, Korea, China, and Japan \u2014 as they approach 2030. Data is sourced from <code>ETS database</code> (48 tables, ~26,300 rows) and <code>research documents</code> (1,600+ items).',
    'Navigate using the top bar to explore system comparisons, allocation evolution, CBAM impacts, convergence mapping, and a 4-language ETS terminology reference.'
  ],
  ja: [
    '\u3053\u306E\u30C0\u30C3\u30B7\u30E5\u30DC\u30FC\u30C9\u306F\u3001EU\u30FB\u97D3\u56FD\u30FB\u4E2D\u56FD\u30FB\u65E5\u672C\u306E4\u3064\u306E\u4E3B\u8981\u7D4C\u6E08\u570F\u306B\u304A\u3051\u308B\u6392\u51FA\u6A29\u53D6\u5F15\u5236\u5EA6\uFF08ETS\uFF09\u306E2030\u5E74\u306B\u5411\u3051\u305F\u7D71\u5408\u5206\u6790\u3092\u53EF\u8996\u5316\u3057\u307E\u3059\u3002\u30C7\u30FC\u30BF\u306F <code>ETS database</code>\uFF0848\u30C6\u30FC\u30D6\u30EB\u3001\u7D0426,300\u884C\uFF09\u3068 <code>research documents</code>\uFF081,600\u4EF6\u4EE5\u4E0A\uFF09\u304B\u3089\u53D6\u5F97\u3057\u3066\u3044\u307E\u3059\u3002',
    '\u4E0A\u90E8\u306E\u30CA\u30D3\u30B2\u30FC\u30B7\u30E7\u30F3\u304B\u3089\u3001\u5236\u5EA6\u6BD4\u8F03\u3001\u5272\u5F53\u65B9\u5F0F\u306E\u9032\u5316\u3001CBAM\u306E\u5F71\u97FF\u3001\u7D71\u5408\u5206\u6790\u30DE\u30C3\u30D7\u30014\u8A00\u8A9EETS\u7528\u8A9E\u96C6\u3092\u3054\u89A7\u304F\u3060\u3055\u3044\u3002'
  ],
  ko: [
    '\uC774 \uB300\uC2DC\uBCF4\uB4DC\uB294 EU\u00B7\uD55C\uAD6D\u00B7\uC911\uAD6D\u00B7\uC77C\uBCF8 4\uAC1C \uC8FC\uC694 \uACBD\uC81C\uAD8C\uC758 \uBC30\uCD9C\uAD8C\uAC70\uB798\uC81C(ETS)\uAC00 2030\uB144\uC744 \uD5A5\uD574 \uC5B4\uB5BB\uAC8C \uC218\uB834\u00B7\uBD84\uAE30\uD558\uACE0 \uC788\uB294\uC9C0 \uC2DC\uAC01\uD654\uD569\uB2C8\uB2E4. \uB370\uC774\uD130\uB294 <code>ETS database</code>(48\uAC1C \uD14C\uC774\uBE14, \uC57D 26,300\uD589)\uC640 <code>research documents</code>(1,600\uAC74 \uC774\uC0C1)\uC5D0\uC11C \uAC00\uC838\uC635\uB2C8\uB2E4.',
    '\uC0C1\uB2E8 \uB0B4\uBE44\uAC8C\uC774\uC158\uC744 \uD1B5\uD574 \uC81C\uB3C4 \uBE44\uAD50, \uD560\uB2F9 \uBC29\uC2DD\uC758 \uC9C4\uD654, CBAM \uC601\uD5A5, \uC218\uB834\u00B7\uBD84\uAE30 \uB9E4\uD551, 4\uAC1C \uC5B8\uC5B4 ETS \uC6A9\uC5B4\uC9D1\uC744 \uC0B4\uD3B4\uBCF4\uC138\uC694.'
  ],
  zh: [
    '\u6B64\u4EEA\u8868\u677F\u53EF\u89C6\u5316\u4E86EU\u00B7\u97E9\u56FD\u00B7\u4E2D\u56FD\u00B7\u65E5\u672C\u56DB\u5927\u7ECF\u6D4E\u4F53\u6392\u653E\u6743\u4EA4\u6613\u5236\u5EA6(ETS)\u57282030\u5E74\u524D\u7684\u8D8B\u540C\u4E0E\u5206\u6B67\u3002\u6570\u636E\u6765\u6E90\u4E8E <code>ETS database</code>\uFF0848\u4E2A\u8868\uFF0C\u7EA626,300\u884C\uFF09\u548C <code>research documents</code>\uFF081,600+\u6761\u76EE\uFF09\u3002',
    '\u901A\u8FC7\u9876\u90E8\u5BFC\u822A\u680F\u63A2\u7D22\u5236\u5EA6\u6BD4\u8F83\u3001\u5206\u914D\u65B9\u5F0F\u6F14\u53D8\u3001CBAM\u5F71\u54CD\u3001\u8D8B\u540C\u00B7\u5206\u6B67\u5730\u56FE\u548C\u56DB\u8BEDETS\u672F\u8BED\u53C2\u8003\u3002'
  ]
};

function renderAbout() {
  const tx = ABOUT[getLang()] || ABOUT.en;
  document.getElementById('about-box').innerHTML =
    `<h3>${t('aboutTitle')}</h3>` + tx.map(p => `<p>${p}</p>`).join('');
}

// === EMBEDDED DATA ===
const PRICES = {"china_cny":[{"year":"2021","avg_price":46.61},{"year":"2022","avg_price":57.96},{"year":"2023","avg_price":69.04},{"year":"2024","avg_price":96.31},{"year":"2025","avg_price":66.87},{"year":"2026","avg_price":78.63}],"korea_krw":[{"year":"2015","avg_price":9145},{"year":"2016","avg_price":14242},{"year":"2017","avg_price":20845},{"year":"2018","avg_price":22752},{"year":"2019","avg_price":28159},{"year":"2020","avg_price":32853},{"year":"2021","avg_price":22697},{"year":"2022","avg_price":23930},{"year":"2023","avg_price":11791},{"year":"2024","avg_price":11737},{"year":"2025","avg_price":11594},{"year":"2026","avg_price":11823}],"eu_eur":[{"year":"2013","avg_price":4.5},{"year":"2014","avg_price":6.0},{"year":"2015","avg_price":7.7},{"year":"2016","avg_price":5.3},{"year":"2017","avg_price":5.8},{"year":"2018","avg_price":15.9},{"year":"2019","avg_price":24.8},{"year":"2020","avg_price":24.6},{"year":"2021","avg_price":53.3},{"year":"2022","avg_price":81.2},{"year":"2023","avg_price":85.0},{"year":"2024","avg_price":65.0},{"year":"2025","avg_price":68.0},{"year":"2026","avg_price":72.0}],"fx":{"KRW_USD":0.000714,"CNY_USD":0.1389,"EUR_USD":1.1}};

// === KPI CARDS ===
const KPI = [
  { country: 'EU', flag: '\u{1F1EA}\u{1F1FA}', price: '\u20AC72/t', priceUsd: '~$79/t', coverage: '40%', entities: '~11,000', since: '2005', color: THEME.countries.EU },
  { country: 'Korea', flag: '\u{1F1F0}\u{1F1F7}', price: '\u20A911,823/t', priceUsd: '~$8/t', coverage: '68%', entities: '~680', since: '2015', color: THEME.countries.Korea },
  { country: 'China', flag: '\u{1F1E8}\u{1F1F3}', price: '\u00A579/t', priceUsd: '~$11/t', coverage: '60%', entities: '~3,500', since: '2021', color: THEME.countries.China },
  { country: 'Japan', flag: '\u{1F1EF}\u{1F1F5}', price: 'GX-ETS', priceUsd: 'N/A', coverage: '60%*', entities: '300-400', since: '2023', color: THEME.countries.Japan },
];

function renderCards() {
  const lang = getLang();
  const labels = { price: t('price'), coverage: t('coverage'), entities: t('entities'), since: t('since') };
  document.getElementById('kpi-cards').innerHTML = KPI.map(k => `
    <div class="card" style="border-top: 3px solid ${k.color};">
      <div class="country-flag">${k.flag}</div>
      <div class="country-name" style="color:${k.color}">${k.country}</div>
      <div class="value" style="color:${k.color}">${k.price}</div>
      <div class="sub">${k.priceUsd}</div>
      <div style="display:flex;justify-content:space-around;margin-top:12px;font-size:0.8em;color:${THEME.muted}">
        <div><div style="font-weight:600;color:${THEME.text}">${k.coverage}</div>${labels.coverage}</div>
        <div><div style="font-weight:600;color:${THEME.text}">${k.entities}</div>${labels.entities}</div>
        <div><div style="font-weight:600;color:${THEME.text}">${k.since}</div>${labels.since}</div>
      </div>
    </div>
  `).join('');
}

// === PRICE CHART ===
function renderPriceChart() {
  const fx = PRICES.fx;
  const traces = [
    {
      x: PRICES.eu_eur.map(r => r.year),
      y: PRICES.eu_eur.map(r => +(r.avg_price * fx.EUR_USD).toFixed(1)),
      name: 'EU-ETS (EUR\u2192USD)', mode: 'lines+markers',
      line: { color: THEME.countries.EU, width: 3 },
      marker: { size: 6 }
    },
    {
      x: PRICES.korea_krw.map(r => r.year),
      y: PRICES.korea_krw.map(r => +(r.avg_price * fx.KRW_USD).toFixed(1)),
      name: 'K-ETS (KRW\u2192USD)', mode: 'lines+markers',
      line: { color: THEME.countries.Korea, width: 3 },
      marker: { size: 6 }
    },
    {
      x: PRICES.china_cny.map(r => r.year),
      y: PRICES.china_cny.map(r => +(r.avg_price * fx.CNY_USD).toFixed(1)),
      name: 'China-ETS (CNY\u2192USD)', mode: 'lines+markers',
      line: { color: THEME.countries.China, width: 3 },
      marker: { size: 6 }
    }
  ];

  const layout = darkLayout(t('chartPrice'), {
    yaxis: { title: 'USD / tCO\u2082', gridcolor: THEME.border, zerolinecolor: THEME.border, tickfont: { color: THEME.muted } },
    xaxis: { title: t('year'), gridcolor: THEME.border, tickfont: { color: THEME.muted } },
    legend: { orientation: 'h', y: -0.15, font: { color: THEME.muted } },
    annotations: [{
      x: '2026', y: 0, xref: 'x', yref: 'y',
      text: t('jpNoPrice'),
      showarrow: false, font: { color: THEME.countries.Japan, size: 11 },
      yshift: 10, xanchor: 'right'
    }]
  });

  Plotly.newPlot('price-chart', traces, layout, plotlyConfig);
}

// === INIT ===
renderCards();
renderPriceChart();
renderAbout();

// Update on language change
window.addEventListener('langchange', () => { renderCards(); renderPriceChart(); renderAbout(); });

// Fix i18n on load
document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
</script>
</body>
</html>
