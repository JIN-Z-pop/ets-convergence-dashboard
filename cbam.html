<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBAM Impact Timeline</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="shared.js?v=2"></script>
</head>
<body>
<script>initPage('cbam');</script>

<div class="page-header">
  <h1 data-i18n="pageCbamTitle"></h1>
  <p data-i18n="pageCbamSub"></p>
</div>

<style>
.timeline { position:relative; max-width:1000px; margin:0 auto 30px; padding:20px; }
.timeline::before { content:''; position:absolute; left:50%; top:0; bottom:0; width:3px; background:linear-gradient(180deg, #3182ce, #e53e3e); transform:translateX(-50%); }
.tl-item { position:relative; margin-bottom:30px; display:flex; align-items:flex-start; }
.tl-item:nth-child(odd) { flex-direction:row-reverse; }
.tl-item:nth-child(odd) .tl-content { text-align:right; margin-right:40px; }
.tl-item:nth-child(even) .tl-content { margin-left:40px; }
.tl-content { width:45%; }
.tl-dot { position:absolute; left:50%; transform:translateX(-50%); width:16px; height:16px; border-radius:50%; border:3px solid #63b3ed; background:#1a2332; z-index:2; }
.tl-dot.critical { border-color:#e53e3e; background:#e53e3e; }
.tl-dot.high { border-color:#ed8936; }
.tl-date { font-size:0.82em; color:#63b3ed; font-weight:600; margin-bottom:4px; }
.tl-type { font-size:1em; font-weight:700; color:#e0e0e0; margin-bottom:6px; }
.tl-desc { font-size:0.85em; color:#a0aec0; line-height:1.5; margin-bottom:8px; }
.tl-impact { display:flex; gap:8px; flex-wrap:wrap; }
.tl-impact:nth-child(odd) { justify-content:flex-end; }
.impact-badge { font-size:0.75em; padding:3px 10px; border-radius:12px; }
.impact-kr { background:#48bb7822; color:#48bb78; border:1px solid #48bb7844; }
.impact-cn { background:#ed893622; color:#ed8936; border:1px solid #ed893644; }

.two-worlds { max-width:1000px; margin:0 auto 30px; padding:30px; background:#1a2332; border-radius:10px; border:1px solid #2d3748; }
.two-worlds h3 { color:#63b3ed; text-align:center; margin-bottom:20px; }
.worlds-grid { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
.world-box { flex:1; min-width:280px; max-width:450px; padding:20px; border-radius:8px; border:1px solid #2d3748; }
.world-eu { background:#3182ce11; border-color:#3182ce44; }
.world-asia { background:#ed893611; border-color:#ed893644; }
.world-box h4 { margin-bottom:12px; font-size:1em; }
.world-box ul { list-style:none; padding:0; font-size:0.85em; line-height:2; color:#a0aec0; }
.world-box li::before { content:'\u25B8 '; }
.convergence-arrow { text-align:center; font-size:1.8em; color:#63b3ed; padding:10px; align-self:center; }

@media (max-width:768px) {
  .timeline::before { left:20px; }
  .tl-item, .tl-item:nth-child(odd) { flex-direction:column; padding-left:40px; }
  .tl-content, .tl-item:nth-child(odd) .tl-content { width:100%; margin:0; text-align:left; }
  .tl-dot { left:20px; }
}
</style>

<div class="timeline" id="timeline"></div>

<div class="two-worlds" id="two-worlds-section"></div>

<script>
const CBAM_EVENTS = [

  { date: '2019-01', type: 'MSR', desc: 'Market Stability Reserve activated. Automatic surplus absorption.', impact: 'medium', kr: null, cn: null },
  { date: '2021-01', type: 'Phase 4', desc: 'Strengthened LRF, aligned to -55% target.', impact: 'high', kr: null, cn: null },
  { date: '2021-07', type: 'Fit for 55', desc: 'European Commission proposes "Fit for 55" package including CBAM.', impact: 'high', kr: 'Alert triggered', cn: 'Limited impact initially' },
  { date: '2023-10', type: 'CBAM Transition', desc: 'CBAM transitional period starts. Reporting only (no charges).', impact: 'high', kr: 'Reporting obligation. K-ETS method mostly compatible.', cn: 'Chinese exporters also required to report.' },
  { date: '2025-01', type: 'EU Method Required', desc: 'CBAM reports must use EU calculation method only (no default values).', impact: 'medium', kr: 'Calculation method adjustment needed', cn: 'Conversion from China method required' },
  { date: '2026-01', type: 'CBAM Full Start', desc: 'CBAM certificates required. Free allocation reduction begins (2.5%/yr).', impact: 'critical', kr: 'Steel industry: ~\u20A9191B/yr cost (BAU)', cn: 'Steel/Aluminum/Cement exports impacted' },
  { date: '2027-01', type: 'ETS2 Start', desc: 'ETS2 (buildings & road transport) begins.', impact: 'high', kr: null, cn: null },
  { date: '2034-01', type: 'CBAM 100%', desc: 'CBAM sectors: 100% free allocation eliminated. Full paid.', impact: 'critical', kr: 'Korean steel: full EU-ETS price gap cost', cn: 'China 3 sectors: full EU-ETS price burden' },
  { date: '2050-01', type: 'Climate Neutral', desc: 'EU climate neutrality target year.', impact: 'high', kr: null, cn: null }
];

// === TWO WORLDS (multilingual) ===

    ],

    ]
  },

      '\u7D76\u5BFE\u91CF\u30AD\u30E3\u30C3\u30D7\uFF08\u5E74\u6B21\u3067\u6E1B\u5C11\uFF09',
      '43%\u4EE5\u4E0A\u304C\u30AA\u30FC\u30AF\u30B7\u30E7\u30F3\uFF08CBAM\u30BB\u30AF\u30BF\u30FC\u306F100%\u3078\uFF09',

      '\u20AC100/t\u7F70\u91D1\uFF0B\u7FCC\u5E74\u7FA9\u52D9'
    ],
    asia: [
      '\u5F37\u5EA6\u30D9\u30FC\u30B9\uFF08\u4E2D\u56FD\uFF09\u307E\u305F\u306F\u6DF7\u5408\u30AD\u30E3\u30C3\u30D7',
      '0-10%\u30AA\u30FC\u30AF\u30B7\u30E7\u30F3\uFF08\u307B\u307C\u7121\u511F\uFF09',
      '\u70AD\u7D20\u4FA1\u683C$8-$11/t \u2014 EU\u306E1/10',

      '\u8EFD\u3044\u7F70\u5247\uFF08\u6539\u5584\u4E2D\uFF09'
    ]
  },
  ko: {
    eu: [
      '\uC808\uB300\uB7C9 \uC0C1\uD55C (\uB9E4\uB144 \uAC10\uC18C)',

      'CBAM\uC774 \uC218\uC785\uD488\uC5D0 \uD0C4\uC18C \uBE44\uC6A9 \uBD80\uACFC',
      '\u20AC100/t \uBC8C\uAE08 + \uCC28\uB144 \uC758\uBB34'
    ],

      '\uAC15\uB3C4 \uAE30\uBC18(\uC911\uAD6D) \uB610\uB294 \uD63C\uD569 \uC0C1\uD55C',
      '0-10% \uACBD\uB9E4 (\uB300\uBD80\uBD84 \uBB34\uC0C1)',

    ]
  },
  zh: {
    eu: [
      '\u7EDD\u5BF9\u603B\u91CF\u4E0A\u9650\uFF08\u9010\u5E74\u9012\u51CF\uFF09',

      '0-10%\u62CD\u5356\uFF08\u4EE5\u514D\u8D39\u4E3A\u4E3B\uFF09',

      'CBAM\u4EA7\u751F\u4EF7\u683C\u5DEE\u8DDD\u98CE\u9669',
      '\u8F83\u8F7B\u5904\u7F5A\uFF08\u6539\u5584\u4E2D\uFF09'
    ]
  }
};

function renderTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = CBAM_EVENTS.map((ev, i) => {
    const dotClass = ev.impact === 'critical' ? 'critical' : ev.impact === 'high' ? 'high' : '';
    let impacts = '';
    if (ev.kr) impacts += `<span class="impact-badge impact-kr">\u{1F1F0}\u{1F1F7} ${ev.kr}</span>`;
    if (ev.cn) impacts += `<span class="impact-badge impact-cn">\u{1F1E8}\u{1F1F3} ${ev.cn}</span>`;
    return `
      <div class="tl-item">
        <div class="tl-dot ${dotClass}"></div>
        <div class="tl-content">
          <div class="tl-date">${ev.date}</div>
          <div class="tl-type">${ev.type}</div>
          <div class="tl-desc">${ev.desc}</div>
          ${impacts ? `<div class="tl-impact">${impacts}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function renderTwoWorlds() {
  const lang = getLang();
  const tw = TWO_WORLDS[lang] || TWO_WORLDS.en;
  document.getElementById('two-worlds-section').innerHTML = `
    <h3>${t('twoWorlds')}</h3>
    <div class="worlds-grid">
      <div class="world-box world-eu">
        <h4 style="color:#3182ce">${t('euWorld')} \u{1F1EA}\u{1F1FA}</h4>
        <ul>${tw.eu.map(li => `<li>${li}</li>`).join('')}</ul>
      </div>
      <div class="convergence-arrow">\u2194</div>
      <div class="world-box world-asia">
        <h4 style="color:#ed8936">${t('asiaWorld')} \u{1F1F0}\u{1F1F7}\u{1F1E8}\u{1F1F3}\u{1F1EF}\u{1F1F5}</h4>
        <ul>${tw.asia.map(li => `<li>${li}</li>`).join('')}</ul>
      </div>
    </div>
    <p style="text-align:center;margin-top:16px;color:#718096;font-size:0.82em;">${t('cbamNote')}</p>`;
}

renderTimeline();
renderTwoWorlds();
window.addEventListener('langchange', () => { renderTwoWorlds(); });
document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
</script>
</body>
</html>
