<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETS Allocation Evolution</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="shared.js?v=9"></script>
</head>
<body>
<script>initPage('allocation');</script>

<div class="page-header">
  <h1 data-i18n="pageAllocTitle"></h1>
  <p data-i18n="pageAllocSub"></p>
</div>

<div class="chart-wrap"><div class="chart-box" id="gantt-chart" style="min-height:350px"></div></div>

<div class="chart-wrap"><div class="chart-box" id="method-chart" style="min-height:440px"></div></div>

<div class="analysis-box" id="alloc-analysis"></div>

<script>
// === ANALYSIS TEXTS ===
const ALLOC_TEXTS = {
  en: [
    '<strong>EU</strong>: Grandfathering (Phase 1-2) \u2192 BM + Auction (Phase 3) \u2192 CBAM-linked full auctioning (Phase 4). The most mature system, approaching 100% paid allocation for CBAM sectors by 2034.',

  ],
  ja: [
    '<strong>EU</strong>: \u904E\u53BB\u6392\u51FA\u91CF\u57FA\u6E96\uFF08Phase 1-2\uFF09\u2192 BM+\u30AA\u30FC\u30AF\u30B7\u30E7\u30F3\uFF08Phase 3\uFF09\u2192 CBAM\u9023\u52D5\u306E\u5B8C\u5168\u6709\u511F\u5316\uFF08Phase 4\uFF09\u3002\u6700\u3082\u6210\u719F\u3057\u305F\u5236\u5EA6\u30672034\u5E74\u307E\u3067\u306BCBAM\u30BB\u30AF\u30BF\u30FC\u3067100%\u6709\u511F\u5272\u5F53\u306B\u5230\u9054\u3002',
    '<strong>\u97D3\u56FD</strong>: Phase 1\u3067100%\u904E\u53BB\u6392\u51FA\u91CF\u57FA\u6E96\u304B\u3089\u958B\u59CB\u3001Phase 2\u3067\u4E00\u90E8\u30BB\u30AF\u30BF\u30FC\u306BBM\u3092\u5C0E\u5165\u3001Phase 3\u306790%\u7121\u511F/10%\u30AA\u30FC\u30AF\u30B7\u30E7\u30F3\u3002\u7DE9\u3084\u304B\u3060\u304C\u7740\u5B9F\u306A\u79FB\u884C\u3002',
    '<strong>\u4E2D\u56FD</strong>: \u521D\u65E5\u304B\u3089\u5F37\u5EA6\u30D9\u30FC\u30B9BM\u3002100%\u7121\u511F\u5272\u5F53\u3002\u30AA\u30FC\u30AF\u30B7\u30E7\u30F3\u672A\u5C0E\u5165\u30022025\u5E74\u306B\u96FB\u529B\u306E\u307F\u304B\u30894\u30BB\u30AF\u30BF\u30FC\uFF08\u9244\u92FC\u30FB\u30BB\u30E1\u30F3\u30C8\u30FB\u30A2\u30EB\u30DF\uFF09\u306B\u62E1\u5927\u3002',
    '<strong>\u65E5\u672C</strong>: GX\u30EA\u30FC\u30B0\u81EA\u4E3B\u76EE\u6A19\uFF082023\u5E74\uFF09\u3002GX-ETS Phase 2\uFF082026\u5E74\uFF09\u3067\u7FA9\u52D9\u7684\u4E0A\u9650\u5C0E\u5165\u306E\u53EF\u80FD\u6027\u3002Phase 3\uFF082033\u5E74\uFF09\u304B\u3089\u30AA\u30FC\u30AF\u30B7\u30E7\u30F3\u8A08\u753B\u3002'
  ],
  ko: [
    '<strong>EU</strong>: \uACFC\uAC70\uBC30\uCD9C\uB7C9 \uAE30\uC900(Phase 1-2) \u2192 BM+\uACBD\uB9E4(Phase 3) \u2192 CBAM \uC5F0\uB3D9 \uC644\uC804 \uC720\uC0C1\uD654(Phase 4). \uAC00\uC7A5 \uC131\uC219\uD55C \uC81C\uB3C4\uB85C 2034\uB144\uAE4C\uC9C0 CBAM \uBD80\uBB38\uC5D0\uC11C 100% \uC720\uC0C1 \uD560\uB2F9 \uB3C4\uB2EC.',
    '<strong>\uD55C\uAD6D</strong>: Phase 1\uC5D0\uC11C 100% \uACFC\uAC70\uBC30\uCD9C\uB7C9 \uAE30\uC900\uC73C\uB85C \uC2DC\uC791, Phase 2\uC5D0\uC11C \uC77C\uBD80 \uBD80\uBB38\uC5D0 BM \uB3C4\uC785, Phase 3\uC5D0\uC11C 90% \uBB34\uC0C1/10% \uACBD\uB9E4. \uC644\uB9CC\uD558\uC9C0\uB9CC \uAFB8\uC900\uD55C \uC804\uD658.',
    '<strong>\uC911\uAD6D</strong>: \uCCAB\uB0A0\uBD80\uD130 \uBC30\uCD9C\uAC15\uB3C4 \uAE30\uBC18 BM. 100% \uBB34\uC0C1 \uD560\uB2F9. \uACBD\uB9E4 \uBBF8\uB3C4\uC785. 2025\uB144 \uC804\uB825\uC5D0\uC11C 4\uAC1C \uBD80\uBB38(\uCCA0\uAC15\u00B7\uC2DC\uBA58\uD2B8\u00B7\uC54C\uB8E8\uBBF8\uB284)\uC73C\uB85C \uD655\uB300.',
    '<strong>\uC77C\uBCF8</strong>: GX\uB9AC\uADF8 \uC790\uC8FC \uBAA9\uD45C(2023). GX-ETS Phase 2(2026)\uC5D0\uC11C \uC758\uBB34\uC801 \uC0C1\uD55C \uB3C4\uC785 \uAC00\uB2A5. Phase 3(2033)\uBD80\uD130 \uACBD\uB9E4 \uACC4\uD68D.'
  ],
  zh: [
    '<strong>EU</strong>: \u5386\u53F2\u6392\u653E\u6CD5(Phase 1-2) \u2192 BM+\u62CD\u5356(Phase 3) \u2192 CBAM\u6302\u94A9\u5168\u9762\u6709\u507F\u5316(Phase 4)\u3002\u6700\u6210\u719F\u7684\u5236\u5EA6\uFF0C2034\u5E74\u524DCBAM\u90E8\u95E8\u8FBE\u5230100%\u6709\u507F\u5206\u914D\u3002',
    '<strong>\u97E9\u56FD</strong>: Phase 1\u4EE5100%\u5386\u53F2\u6392\u653E\u6CD5\u8D77\u6B65\uFF0CPhase 2\u5F15\u5165\u90E8\u5206\u90E8\u95E8BM\uFF0CPhase 3\u8FBE\u523090%\u514D\u8D39/10%\u62CD\u5356\u3002\u6E10\u8FDB\u4F46\u7A33\u6B65\u8F6C\u578B\u3002',
    '<strong>\u4E2D\u56FD</strong>: \u4ECE\u7B2C\u4E00\u5929\u8D77\u5C31\u91C7\u7528\u5F3A\u5EA6\u57FA\u51C6\u503C\u6CD5\u3002100%\u514D\u8D39\u5206\u914D\u3002\u5C1A\u65E0\u62CD\u5356\u673A\u5236\u30022025\u5E74\u4ECE\u7535\u529B\u6269\u5C55\u81F34\u4E2A\u90E8\u95E8\uFF08\u94A2\u94C1\u00B7\u6C34\u6CE5\u00B7\u94DD\u51B6\u70BC\uFF09\u3002',
    '<strong>\u65E5\u672C</strong>: GX\u8054\u76DF\u81EA\u4E3B\u76EE\u6807(2023)\u3002GX-ETS Phase 2(2026)\u53EF\u80FD\u5F15\u5165\u5F3A\u5236\u4E0A\u9650\u3002Phase 3(2033)\u8D77\u8BA1\u5212\u62CD\u5356\u3002'
  ]
};

function renderAnalysis() {
  const tx = ALLOC_TEXTS[getLang()] || ALLOC_TEXTS.en;
  document.getElementById('alloc-analysis').innerHTML =
    `<h3>${t('allocPath')}</h3>` + tx.map(p => `<p>${p}</p>`).join('');
}

// === DATA (loaded via fetch) ===
let PHASES = null;
let METHOD_MIX = null;

function renderGantt() {
  if (!PHASES) return;
  const traces = PHASES.map(p => ({
    type: 'bar',
    orientation: 'h',
    y: [p.country],
    x: [p.end - p.start + 1],
    base: p.start,
    name: p.phase,
    marker: { color: p.color },
    hovertemplate: `<b>${p.country} \u2014 ${p.phase}</b><br>${p.start}-${p.end}<br>Method: ${p.method}` +
      (p.free !== null ? `<br>Free: ${p.free}% / Auction: ${p.auction}%` : '') + '<extra></extra>',
    text: p.phase,
    textposition: 'inside',
    textfont: { color: '#fff', size: 13 },
    showlegend: false
  }));

  const layout = darkLayout(t('chartGantt'), {
    barmode: 'overlay',
    xaxis: { title: t('year'), range: [2004, 2041], gridcolor: THEME.border, tickfont: { color: THEME.muted }, dtick: 5 },
    yaxis: { tickfont: { color: THEME.muted, size: 13 }, automargin: true },
    margin: { l: 80, r: 30, t: 45, b: 45 },
    height: 330,
    annotations: [
      { x: 2026, y: 1.15, yref: 'paper', text: '\u25BC CBAM Start', showarrow: false, font: { color: THEME.accent, size: 12 } }
    ],
    shapes: [
      { type: 'line', x0: 2026, x1: 2026, y0: 0, y1: 1, yref: 'paper', line: { color: THEME.accent, width: 1.5, dash: 'dash' } }
    ]
  });

  Plotly.newPlot('gantt-chart', traces, layout, plotlyConfig);
}

// === ALLOCATION METHOD STACKED BAR ===
function renderMethodChart() {
  if (!METHOD_MIX) return;
  const periods = METHOD_MIX;
  const traces = [
    { name: 'Grandfathering (GF)', x: periods.map(p => p.label), y: periods.map(p => p.gf), type: 'bar', marker: { color: '#3182ce' } },
    { name: 'Benchmark (BM)', x: periods.map(p => p.label), y: periods.map(p => p.bm), type: 'bar', marker: { color: '#48bb78' } },
    { name: 'Auction', x: periods.map(p => p.label), y: periods.map(p => p.auction), type: 'bar', marker: { color: '#ed8936' } },
  ];

  const layout = darkLayout(t('chartMethod'), {
    barmode: 'stack',
    yaxis: { title: '%', range: [0, 105], gridcolor: THEME.border, tickfont: { color: THEME.muted } },
    xaxis: { tickfont: { color: THEME.muted, size: 12 } },
    legend: { orientation: 'h', y: -0.2, font: { color: THEME.muted, size: 13 } },
    height: 420,
    margin: { l: 50, r: 30, t: 40, b: 70 }
  });

  Plotly.newPlot('method-chart', traces, layout, plotlyConfig);
}

renderAnalysis();

// Load data then render charts
fetch('data/allocation.json')
  .then(r => r.json())
  .then(data => {
    PHASES = data.gantt;
    METHOD_MIX = data.method_mix;
    renderGantt();
    renderMethodChart();
  })
  .catch(err => console.error('Failed to load allocation data:', err));

window.addEventListener('langchange', () => { renderGantt(); renderMethodChart(); renderAnalysis(); });
document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
</script>
</body>
</html>
